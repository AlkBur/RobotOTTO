<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
	<title>ESP32 Gamepad</title>
	<style>
		* {
			user-select: none;
			touch-action: manipulation;
			box-sizing: border-box;
		}

		body {
			background: #1a1e2a;
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			margin: 0;
			padding: 16px;
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
		}

		.container {
			max-width: 500px;
			width: 100%;
			background: #0f1222;
			border-radius: 48px;
			padding: 20px;
			box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
		}

		.status-bar {
			background: #2a2f3f;
			border-radius: 40px;
			padding: 8px 20px;
			margin-bottom: 24px;
			text-align: center;
			font-weight: bold;
			color: #eee;
			display: flex;
			justify-content: space-between;
			flex-wrap: wrap;
		}

		.status-led {
			display: inline-block;
			width: 12px;
			height: 12px;
			border-radius: 50%;
			background: #ff5555;
			margin-right: 8px;
			transition: background 0.2s;
		}

		.status-led.connected {
			background: #55ff55;
			box-shadow: 0 0 8px #55ff55;
		}

		.joystick-area {
			background: #202433;
			border-radius: 50%;
			width: 100%;
			aspect-ratio: 1 / 1;
			margin-bottom: 32px;
			position: relative;
			display: flex;
			justify-content: center;
			align-items: center;
			box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.6), 0 8px 18px rgba(0, 0, 0, 0.3);
		}

		canvas {
			width: 100%;
			height: 100%;
			display: block;
			border-radius: 50%;
			touch-action: none;
		}

		.dpad-grid {
			display: flex;
			flex-direction: column;
			align-items: center;
			margin-top: 20px;
			gap: 12px;
		}

		.dpad-row {
			display: flex;
			justify-content: center;
			gap: 20px;
		}

		.dpad-btn {
			background: #2e3440;
			width: 80px;
			height: 80px;
			border-radius: 24px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 2.4rem;
			font-weight: bold;
			color: white;
			box-shadow: 0 8px 0 #0b0e16;
			transition: all 0.05s linear;
			touch-action: manipulation;
			cursor: pointer;
		}

		.dpad-btn:active,
		.dpad-btn.active {
			transform: translateY(4px);
			box-shadow: 0 2px 0 #0b0e16;
			background: #4c5a7a;
		}

		.value-panel {
			background: #00000066;
			border-radius: 32px;
			padding: 12px 16px;
			margin-top: 24px;
			font-family: monospace;
			font-size: 0.9rem;
			color: #bbffcc;
			text-align: center;
			backdrop-filter: blur(4px);
		}

		@media (max-width: 480px) {
			.dpad-btn {
				width: 70px;
				height: 70px;
				font-size: 2rem;
			}
		}

		@media (max-width: 380px) {
			.dpad-btn {
				width: 60px;
				height: 60px;
				font-size: 1.8rem;
			}
		}
	</style>
</head>

<body>
	<div class="container">
		<div class="status-bar">
			<span>🎮 ESP32 Controller</span>
			<span><span id="wsLed" class="status-led"></span> <span id="wsStatus">Отключено</span></span>
		</div>

		<div class="joystick-area">
			<canvas id="joystickCanvas" width="500" height="500"></canvas>
		</div>

		<div class="dpad-grid">
			<div class="dpad-row">
				<div class="dpad-btn" data-dir="U">▲</div>
			</div>
			<div class="dpad-row">
				<div class="dpad-btn" data-dir="L">◀</div>
				<div class="dpad-btn" data-dir="D">▼</div>
				<div class="dpad-btn" data-dir="R">▶</div>
			</div>
		</div>

		<div class="value-panel">
			🕹️ Джойстик: <span id="joyVal">X:0 Y:0</span> &nbsp;&nbsp;|&nbsp;&nbsp;
			🎛️ D-Pad: <span id="dpadVal">—</span>
		</div>
	</div>

	<script>
		// ----- WebSocket -----
		let ws = null;
		const wsLed = document.getElementById('wsLed');
		const wsStatusSpan = document.getElementById('wsStatus');

		function connectWebSocket() {
			const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
			const host = window.location.hostname;
			const port = window.location.port || '80';
			const url = `${protocol}//${host}:${port}/ws`;
			ws = new WebSocket(url);

			ws.onopen = () => {
				wsLed.classList.add('connected');
				wsStatusSpan.innerText = 'Подключено';
			};
			ws.onclose = () => {
				wsLed.classList.remove('connected');
				wsStatusSpan.innerText = 'Отключено';
				setTimeout(connectWebSocket, 3000);
			};
			ws.onerror = (err) => ws.close();
		}

		function sendCompact(cmd) {
			if (ws && ws.readyState === WebSocket.OPEN) {
				ws.send(cmd);
			}
		}

		// ----- Джойстик -----
		const canvas = document.getElementById('joystickCanvas');
		const ctx = canvas.getContext('2d');
		let rect = canvas.getBoundingClientRect();

		let joystickActive = false;
		let joyX = 0, joyY = 0;
		let joyCenterX = 0, joyCenterY = 0;
		let joyRadius = 0;
		let stickX = 0, stickY = 0;

		function resizeCanvas() {
			rect = canvas.getBoundingClientRect();
			canvas.width = rect.width;
			canvas.height = rect.height;
			joyCenterX = rect.width / 2;
			joyCenterY = rect.height / 2;
			joyRadius = Math.min(rect.width, rect.height) * 0.4;
			if (!joystickActive) {
				stickX = joyCenterX;
				stickY = joyCenterY;
				joyX = 0; joyY = 0;
			}
			drawJoystick();
		}

		function drawJoystick() {
			ctx.clearRect(0, 0, canvas.width, canvas.height);
			ctx.beginPath();
			ctx.arc(joyCenterX, joyCenterY, joyRadius, 0, 2 * Math.PI);
			ctx.fillStyle = '#2c3042';
			ctx.fill();
			ctx.strokeStyle = '#5f6a8a';
			ctx.lineWidth = 3;
			ctx.stroke();
			ctx.beginPath();
			ctx.arc(stickX, stickY, joyRadius * 0.4, 0, 2 * Math.PI);
			ctx.fillStyle = '#ffaa44';
			ctx.fill();
			ctx.strokeStyle = '#cc8822';
			ctx.lineWidth = 2;
			ctx.stroke();
		}

		function formatSigned3(value) {
			// value: -1..1 -> отображаем как -100..100
			let intVal = Math.round(value * 100);
			intVal = Math.min(100, Math.max(-100, intVal));
			const sign = intVal >= 0 ? '+' : '-';
			const absVal = Math.abs(intVal);
			const str = (absVal < 10 ? '0' + absVal : '' + absVal).padStart(2, '0');
			return sign + (absVal < 10 ? '0' + absVal : '' + absVal);
			// Внимание: для значений 100 -> "+100" (3 символа), для 5 -> "+05"? но нам нужно три символа включая знак? По спецификации: знак + две цифры? Лучше сделать три цифры всегда: +100, +050, +005. Упростим: три цифры после знака.
			// Исправим: три цифры всегда.
		}
		function formatSigned3Fixed(value) {
			let intVal = Math.round(value * 100);
			intVal = Math.min(100, Math.max(-100, intVal));
			const sign = intVal >= 0 ? '+' : '-';
			let absVal = Math.abs(intVal);
			let numStr = absVal.toString().padStart(3, '0'); // 3 цифры: 000..100
			return sign + numStr;
		}

		function sendJoystick() {
			let xStr = formatSigned3Fixed(joyX);
			let yStr = formatSigned3Fixed(joyY);
			let cmd = 'J' + xStr + yStr; // например "J+045-032"
			sendCompact(cmd);
			document.getElementById('joyVal').innerHTML = `X:${(joyX * 100).toFixed(0)} Y:${(joyY * 100).toFixed(0)}`;
		}

		function updateJoystickPosition(clientX, clientY) {
			const r = canvas.getBoundingClientRect();
			let rawX = clientX - r.left;
			let rawY = clientY - r.top;
			let dx = rawX - joyCenterX;
			let dy = rawY - joyCenterY;
			const dist = Math.hypot(dx, dy);
			if (dist > joyRadius) {
				dx = dx * (joyRadius / dist);
				dy = dy * (joyRadius / dist);
			}
			stickX = joyCenterX + dx;
			stickY = joyCenterY + dy;
			joyX = dx / joyRadius;
			joyY = dy / joyRadius;
			joyX = Math.min(1, Math.max(-1, joyX));
			joyY = Math.min(1, Math.max(-1, joyY));
			drawJoystick();
			sendJoystick();
		}

		function resetJoystick() {
			joystickActive = false;
			stickX = joyCenterX;
			stickY = joyCenterY;
			joyX = 0; joyY = 0;
			drawJoystick();
			sendJoystick();
		}

		function onStart(e) {
			e.preventDefault();
			joystickActive = true;
			const point = e.touches ? e.touches[0] : e;
			updateJoystickPosition(point.clientX, point.clientY);
		}
		function onMove(e) {
			if (!joystickActive) return;
			e.preventDefault();
			const point = e.touches ? e.touches[0] : e;
			updateJoystickPosition(point.clientX, point.clientY);
		}
		function onEnd(e) {
			if (!joystickActive) return;
			e.preventDefault();
			resetJoystick();
		}

		canvas.addEventListener('touchstart', onStart);
		canvas.addEventListener('touchmove', onMove);
		canvas.addEventListener('touchend', onEnd);
		canvas.addEventListener('mousedown', onStart);
		window.addEventListener('mousemove', onMove);
		window.addEventListener('mouseup', onEnd);
		window.addEventListener('resize', () => { resizeCanvas(); });
		resizeCanvas();

		// ----- D-Pad (компактные строки) -----
		const dpadBtns = document.querySelectorAll('.dpad-btn');
		let activeDpad = null;

		function sendDpad(dir, state) { // state 1 или 0
			let cmd = 'D' + dir + state;
			sendCompact(cmd);
			const span = document.getElementById('dpadVal');
			if (state === 1) span.innerText = dir;
			else if (activeDpad === null) span.innerText = '—';
		}

		function handleStart(dir) {
			if (activeDpad === dir) return;
			if (activeDpad !== null) sendDpad(activeDpad, 0);
			activeDpad = dir;
			sendDpad(dir, 1);
		}
		function handleEnd(dir) {
			if (activeDpad !== dir) return;
			sendDpad(dir, 0);
			activeDpad = null;
		}

		dpadBtns.forEach(btn => {
			const dir = btn.getAttribute('data-dir');
			btn.addEventListener('touchstart', (e) => {
				e.preventDefault();
				handleStart(dir);
				btn.classList.add('active');
			});
			btn.addEventListener('touchend', (e) => {
				e.preventDefault();
				handleEnd(dir);
				btn.classList.remove('active');
			});
			btn.addEventListener('mousedown', (e) => {
				e.preventDefault();
				handleStart(dir);
				btn.classList.add('active');
			});
			window.addEventListener('mouseup', () => {
				if (activeDpad === dir) {
					handleEnd(dir);
					btn.classList.remove('active');
				}
			});
			btn.addEventListener('mouseleave', () => {
				if (activeDpad === dir) {
					handleEnd(dir);
					btn.classList.remove('active');
				}
			});
		});

		connectWebSocket();
		setInterval(() => {
			if (ws && ws.readyState === WebSocket.OPEN) sendCompact('P');
		}, 25000);
	</script>
</body>

</html>
